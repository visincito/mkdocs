site_name: Visin Documentación
site_url: https://docs.grilo.gal
site_description: Documentación técnica sobre VoIP (Asterisk, Kamailio, Verbio), Kubernetes (k8s, Microk8s, Kind, K9s), Proxmox, PNETLab y más.
repo_url: https://github.com/visincito/mkdocs
repo_name: 'visincito/mkdocs'
dev_addr: 0.0.0.0:8000

nav:
  - Home: index.md
  - VoIP:
    - VoIP: voip/index.md
    - Asterisk:
        - Paquete voces en Español: voip/asterisk-voice.md
        - Instalar Asterisk: voip/asterisk-install.md
        - Pattern Matching: voip/asterisk-pattern.md
        - Asterisk + chan_dongle: voip/asterisk-dongle.md
        - Usar GoogleTTS de Google Traslation: voip/asterisk-googletts.md
    - Kamailio:
        - Instalar Kamailio con sqlite3: voip/kamailio-install.md
    - Verbio:
        - Crear archivos wav con Verbio TTS cli: voip/verbio-grabar.md
        - Domina Verbio TTS desde CLI: voip/verbio-cli-tts.md
  - Kubernetes:
    - Kubernetes: kubernetes/index.md
    - k8s:
      - Instalar k8s: kubernetes/k8s-install.md
      - Añadir nodo k8s: kubernetes/k8s-add-node.md
    - Microk8s:
      - Error certificados metrics-server: kubernetes/mk8s-cert-metrics.md
    - Kind:
      - Instalar Kind: kubernetes/kind-install.md
    - K9s:
      - Instalación y Configuración de K9s: kubernetes/k9s-install.md
  - Proxmox:
    - Proxmox: proxmox/index.md
    - Configuración SDN en Proxmox: proxmox/proxmox-sdn.md
    - Migrar VM con PBS: proxmox/proxmox-migracion-vm-pbs.md
  - PNETLab:
    - Acceso remoto con Cloudflare Tunnel: pnetlab/pnetlab-cloudflare-tunnel.md
  - Blog:
      - blog/index.md
  - About: about.md

theme:
  name: 'material'
  logo: images/avatar.png
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.code.select
    - toc.follow
  language: es
  icon:
    repo: fontawesome/brands/github
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/arrange-bring-forward
        name: Switch to dark mode
      primary: indigo
      accent: deep purple

    # Palette toggle for dark mode
    - scheme: slate 
      toggle:
        icon: material/arrange-send-backward
        name: Switch to light mode    
      primary: indigo
      accent: deep purple

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

  # Python Markdown Extensions
  - pymdownx.critic
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - tags
  - search
  - blog:
      blog_dir: blog
      post_dir: "{blog}/articles"
      authors_file: "{blog}/.authors.yml"
      blog_toc: true
      post_date_format: long

copyright: >
  Copyright &copy; 2026 Visin – 
  <a href="#__consent">Change cookie settings</a>

extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/visincito
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/Visincito
    - icon: fontawesome/solid/paper-plane
      link: mailto:visincito@gmail.com
